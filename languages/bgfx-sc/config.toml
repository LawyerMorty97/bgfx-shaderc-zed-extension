name = "bgfx shaderc"
grammar = "glsl"
path_suffixes = ["sc", "def.sc"]

line_comments = ["// "]
block_comment = ["/*", "*/"]

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = false },
    { start = "(", end = ")", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false },
]
